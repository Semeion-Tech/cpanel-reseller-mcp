version: 2
updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    groups:
      python-runtime:
        patterns:
          - aiomysql
          - httpx
          - jsonschema
          - mcp
          - pydantic
          - pydantic-settings
          - sqlglot
          - typer
          - uvicorn
      python-development:
        patterns:
          - mypy
          - pip-audit
          - pytest
          - pytest-asyncio
          - respx
          - ruff
          - types-jsonschema

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:15"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:30"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 3
